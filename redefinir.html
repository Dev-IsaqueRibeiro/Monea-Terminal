<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monea - Nova Senha</title>
    <link rel="stylesheet" href="CSS/styles.css?v=2" />

    <link rel="icon" type="image/x-icon" href="IMAGES/logo_moneaICO.ico" />
  </head>
  <body class="auth-page">
    <main class="auth-container">
      <div class="auth-card">
        <header class="auth-header">
          <img src="IMAGES/Logo2.png" id="authLogo" alt="Monea" />
          <h1>Redefinir Senha</h1>
          <p class="field-alter2">Digite sua nova senha de acesso.</p>
        </header>

        <form id="formRedefinir">
          <div class="field password-field">
            <input
              type="password"
              id="novaSenha"
              placeholder="Nova senha"
              required
            />
            <button type="button" class="icon-btn">🔒</button>
          </div>

          <div class="field password-field">
            <input
              type="password"
              id="confirmarNovaSenha"
              placeholder="Confirme a nova senha"
              required
            />
            <button type="button" class="icon-btn">🔒</button>
          </div>

          <button type="submit" id="btnSalvarSenha">Atualizar Senha</button>
        </form>
      </div>
    </main>

    <div id="moneaAlertModal" class="monea-modal-overlay hidden">
      <div class="monea-modal-card">
        <img src="IMAGES/Logo2.png" class="modal-logo" alt="Monea" />
        <h3 id="moneaTitle" class="monea-alert-title">Título</h3>
        <p id="moneaMsg" class="monea-alert-msg">Mensagem aqui</p>
        <button id="moneaBtnClose" class="btn-stop">Entendido</button>
      </div>
    </div>

    <script type="module" src="JS/auth.js"></script>
  </body>
</html>
