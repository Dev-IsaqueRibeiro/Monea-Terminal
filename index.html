<!-- index.html -->

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monea Terminal - Login</title>
    <link rel="stylesheet" href="CSS/styles.css" />
    <link rel="manifest" href="manifest.json" />

    <link rel="icon" type="image/x-icon" href="IMAGES/logo_moneaICO.ico" />
  </head>
  <body class="bg-luz-central">
    <main class="auth-container">
      <section class="auth-card">
        <header class="auth-header">
          <img src="IMAGES/Logo2.png" alt="Monea Logo" id="authLogo" />
          <h1>Acessar o Monea</h1>
        </header>

        <form id="loginForm">
          <div class="field country-wrapper">
            <div id="countryDisplay" class="custom-select-trigger">
              <div class="country-info">
                <span id="selectedFlag">🌍</span>
                <span id="selectedCountryName">Selecione seu país</span>
              </div>
              <span class="select-arrow">
                <svg
                  width="12"
                  height="12"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M6 9l6 6 6-6" />
                </svg>
              </span>
            </div>

            <div id="countryList" class="country-dropdown hidden"></div>
          </div>

          <div class="field">
            <input type="email" id="email" placeholder="Email" required />
          </div>

          <div class="field password-field">
            <input type="password" id="password" placeholder="Senha" required />
            <button type="button" id="btnTogglePass" class="icon-btn">
              🔒
            </button>
          </div>

          <div id="feedbackMessage" class="feedback-box hidden"></div>

          <div class="actions">
            <button type="button" id="btnForgot" class="btn-link">
              <span class="icon-lock">🔒</span> Esqueci minha senha
            </button>
          </div>

          <button type="submit" id="btnSubmit">Entrar</button>
        </form>

        <footer class="auth-footer">
          <p>Não tem conta? <a href="register.html">Criar agora</a></p>
        </footer>
      </section>
    </main>

    <!-- MODAL GERAL -->
    <div id="moneaAlertModal" class="monea-modal-overlay hidden">
      <div class="monea-modal-card">
        <img src="IMAGES/Logo2.png" class="modal-logo" alt="Monea" />
        <h3 id="moneaTitle" class="monea-alert-title">Título</h3>
        <p id="moneaMsg" class="monea-alert-msg">Mensagem aqui</p>
        <button id="moneaBtnClose" class="btn-stop">Entendido</button>
      </div>
    </div>

    <script type="module" src="JS/auth.js"></script>
    <script type="module" src="JS/auth.js"></script>
</body>
  </body>
</html>
